<!DOCTYPE html>
<html lang="ko">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>팀 스케줄 관리</title>
<style>
  *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
  :root {
    --bg: #ffffff;
    --bg2: #f7f7f5;
    --bg3: #f0efe9;
    --text: #1a1a1a;
    --text2: #555550;
    --text3: #999990;
    --border: rgba(0,0,0,0.12);
    --border2: rgba(0,0,0,0.22);
    --radius: 8px;
    --radius-lg: 12px;
    --blue: #1a73e8;
    --blue-bg: rgba(26,115,232,0.10);
    --red: #d93025;
    --red-bg: rgba(217,48,37,0.10);
    --green: #1e8e3e;
  }
  @media (prefers-color-scheme: dark) {
    :root {
      --bg: #1e1e1c;
      --bg2: #272724;
      --bg3: #303030;
      --text: #f0f0ed;
      --text2: #aaaaaa;
      --text3: #666660;
      --border: rgba(255,255,255,0.12);
      --border2: rgba(255,255,255,0.22);
      --blue: #4da3ff;
      --blue-bg: rgba(77,163,255,0.12);
      --red: #ff6b6b;
      --red-bg: rgba(255,107,107,0.12);
      --green: #4caf50;
    }
  }

  body {
    font-family: 'Pretendard', 'Apple SD Gothic Neo', 'Noto Sans KR', sans-serif;
    background: var(--bg3);
    color: var(--text);
    min-height: 100vh;
    padding: 0;
  }

  /* ── TOP BAR ── */
  .topbar {
    position: sticky; top: 0; z-index: 100;
    background: var(--bg);
    border-bottom: 0.5px solid var(--border);
    padding: 10px 16px;
    display: flex; align-items: center; justify-content: space-between;
    flex-wrap: wrap; gap: 8px;
    box-shadow: 0 1px 4px rgba(0,0,0,0.06);
  }
  .app-title {
    font-size: 17px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .app-title-icon {
    width: 28px; height: 28px; background: var(--blue); border-radius: 6px;
    display: flex; align-items: center; justify-content: center;
    color: white; font-size: 14px; font-weight: 700;
  }
  .week-nav {
    display: flex; align-items: center; gap: 6px;
  }
  .nav-btn {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 6px 14px;
    cursor: pointer; font-size: 13px; color: var(--text);
    font-family: inherit; transition: background 0.15s;
  }
  .nav-btn:hover { background: var(--bg3); }
  .week-label {
    font-size: 13px; font-weight: 500; color: var(--text);
    min-width: 190px; text-align: center;
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: var(--radius); padding: 6px 10px;
  }
  .topbar-actions { display: flex; gap: 8px; align-items: center; }
  .btn-save {
    background: var(--blue); color: white;
    border: none; border-radius: var(--radius);
    padding: 7px 18px; cursor: pointer;
    font-size: 13px; font-weight: 600; font-family: inherit;
    transition: background 0.15s, transform 0.1s;
  }
  .btn-save:hover { background: #1557b0; }
  .btn-save:active { transform: scale(0.97); }
  .btn-save.saved { background: var(--green); }
  .btn-edit-names {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 7px 14px;
    cursor: pointer; font-size: 13px; color: var(--text); font-family: inherit;
    transition: background 0.15s;
  }
  .btn-edit-names:hover { background: var(--bg3); }

  /* ── MAIN ── */
  .main { padding: 16px; max-width: 1400px; margin: 0 auto; }

  .section { margin-bottom: 20px; }
  .section-header {
    font-size: 13px; font-weight: 500; color: var(--text2);
    margin-bottom: 8px; padding-bottom: 6px;
    border-bottom: 0.5px solid var(--border);
    display: flex; align-items: center; gap: 6px;
  }
  .section-badge {
    background: var(--bg2); border: 0.5px solid var(--border);
    border-radius: 4px; padding: 1px 7px; font-size: 11px; color: var(--text3);
  }

  /* ── TABLES ── */
  .table-scroll { overflow-x: auto; border-radius: var(--radius-lg); border: 0.5px solid var(--border); background: var(--bg); }
  table { width: 100%; border-collapse: collapse; font-size: 12px; min-width: 560px; }
  th, td { border: 0.5px solid var(--border); padding: 6px 7px; text-align: center; }
  thead th { background: var(--bg2); font-weight: 500; color: var(--text2); font-size: 11px; }
  .th-day {
    background: var(--bg2) !important; font-weight: 600 !important;
    color: var(--text) !important; cursor: pointer; user-select: none;
    font-size: 12px !important;
  }
  .th-day:hover { background: var(--bg3) !important; }
  .th-period { cursor: pointer; user-select: none; }
  .th-period:hover { background: var(--bg3) !important; }
  .td-name {
    background: var(--bg2); font-weight: 500;
    text-align: left; padding-left: 12px;
    color: var(--text); min-width: 72px; font-size: 12px;
    white-space: nowrap;
  }
  .td-name-sm { font-size: 11px; color: var(--text2); }
  .td-collapsed { background: var(--bg3); width: 22px; min-width: 22px; cursor: pointer; }
  .td-collapsed:hover { background: var(--bg2); }

  /* OX display */
  .v-o { color: var(--blue); font-weight: 600; font-size: 13px; }
  .v-x { color: var(--red); font-weight: 600; font-size: 13px; }
  .v-empty { color: var(--text3); font-size: 11px; }

  /* Count */
  .cnt-full { background: var(--blue-bg); color: var(--blue); font-weight: 600; }
  .cnt-partial { background: rgba(234,134,0,0.10); color: #c05800; font-weight: 500; }
  .cnt-none { color: var(--text3); }

  /* Note input */
  .note-input {
    width: 100%; min-width: 70px; font-size: 11px;
    border: 0.5px solid var(--border); border-radius: 4px;
    padding: 4px 6px; background: var(--bg); color: var(--text);
    outline: none; font-family: inherit;
  }
  .note-input:focus { border-color: var(--blue); }
  .note-input::placeholder { color: var(--text3); }

  /* ── MEMBER SECTIONS ── */
  .member-block {
    background: var(--bg); border: 0.5px solid var(--border);
    border-radius: var(--radius-lg); margin-bottom: 8px; overflow: hidden;
  }
  .member-block-header {
    display: flex; align-items: center; justify-content: space-between;
    padding: 9px 14px; cursor: pointer; user-select: none;
    background: var(--bg);
    transition: background 0.12s;
  }
  .member-block-header:hover { background: var(--bg2); }
  .member-block-name {
    font-size: 13px; font-weight: 600; color: var(--text);
    display: flex; align-items: center; gap: 8px;
  }
  .member-avatar {
    width: 26px; height: 26px; border-radius: 50%;
    display: flex; align-items: center; justify-content: center;
    font-size: 11px; font-weight: 700; flex-shrink: 0;
  }
  .member-block-toggle { font-size: 11px; color: var(--text3); }

  /* OX Buttons */
  .ox-btn {
    width: 34px; height: 28px;
    border: 0.5px solid var(--border);
    border-radius: 5px; cursor: pointer;
    font-size: 13px; font-weight: 600;
    background: var(--bg); color: var(--text3);
    font-family: inherit;
    transition: background 0.12s, border-color 0.12s, color 0.12s, transform 0.08s;
  }
  .ox-btn:hover { background: var(--bg2); transform: scale(1.05); }
  .ox-btn:active { transform: scale(0.95); }
  .ox-btn.is-o { background: var(--blue-bg); border-color: var(--blue); color: var(--blue); }
  .ox-btn.is-x { background: var(--red-bg); border-color: var(--red); color: var(--red); }

  /* ── TOAST ── */
  .toast {
    position: fixed; bottom: 24px; right: 24px; z-index: 9999;
    background: var(--green); color: white;
    padding: 11px 20px; border-radius: var(--radius);
    font-size: 13px; font-weight: 600;
    opacity: 0; transform: translateY(8px);
    transition: opacity 0.25s, transform 0.25s;
    pointer-events: none; box-shadow: 0 2px 12px rgba(0,0,0,0.18);
  }
  .toast.show { opacity: 1; transform: translateY(0); }

  /* ── NAME EDIT MODAL ── */
  .modal-overlay {
    display: none; position: fixed; inset: 0; z-index: 500;
    background: rgba(0,0,0,0.45);
    align-items: center; justify-content: center;
  }
  .modal-overlay.open { display: flex; }
  .modal {
    background: var(--bg); border-radius: var(--radius-lg);
    padding: 20px; width: 320px; max-width: 95vw;
    border: 0.5px solid var(--border);
    box-shadow: 0 8px 32px rgba(0,0,0,0.18);
  }
  .modal-title { font-size: 16px; font-weight: 600; margin-bottom: 16px; color: var(--text); }
  .modal-row { display: flex; align-items: center; gap: 8px; margin-bottom: 10px; }
  .modal-avatar { width: 28px; height: 28px; border-radius: 50%; flex-shrink: 0; display: flex; align-items: center; justify-content: center; font-size: 11px; font-weight: 700; }
  .modal-input {
    flex: 1; border: 0.5px solid var(--border2); border-radius: var(--radius);
    padding: 7px 10px; font-size: 13px; color: var(--text);
    background: var(--bg); font-family: inherit; outline: none;
  }
  .modal-input:focus { border-color: var(--blue); }
  .modal-actions { display: flex; gap: 8px; justify-content: flex-end; margin-top: 16px; }
  .modal-btn-cancel {
    background: var(--bg2); border: 0.5px solid var(--border2);
    border-radius: var(--radius); padding: 7px 16px;
    cursor: pointer; font-size: 13px; color: var(--text); font-family: inherit;
  }
  .modal-btn-ok {
    background: var(--blue); color: white; border: none;
    border-radius: var(--radius); padding: 7px 20px;
    cursor: pointer; font-size: 13px; font-weight: 600; font-family: inherit;
  }

  /* ── COLOR AVATARS ── */
  .av0 { background: #dbeafe; color: #1e40af; }
  .av1 { background: #dcfce7; color: #166534; }
  .av2 { background: #fef3c7; color: #92400e; }
  .av3 { background: #fce7f3; color: #9d174d; }
  .av4 { background: #ede9fe; color: #5b21b6; }
  .av5 { background: #ffedd5; color: #9a3412; }
  .av6 { background: #d1fae5; color: #065f46; }
  .av7 { background: #f0f9ff; color: #0369a1; }

  @media (max-width: 600px) {
    .topbar { padding: 8px 12px; }
    .app-title span { display: none; }
    .week-label { min-width: 150px; font-size: 12px; }
    .main { padding: 10px; }
    .nav-btn { padding: 6px 10px; font-size: 12px; }
  }
</style>
</head>
<body>

<!-- TOP BAR -->
<div class="topbar">
  <div class="app-title">
    <div class="app-title-icon">T</div>
    <span>팀 스케줄 관리</span>
  </div>
  <div class="week-nav">
    <button class="nav-btn" onclick="changeWeek(-1)">◀ 이전</button>
    <div class="week-label" id="weekLabel"></div>
    <button class="nav-btn" onclick="changeWeek(1)">다음 ▶</button>
  </div>
  <div class="topbar-actions">
    <button class="btn-edit-names" onclick="openModal()">✏️ 이름 편집</button>
    <button class="btn-save" id="saveBtn" onclick="saveData()">💾 저장</button>
  </div>
</div>

<!-- MAIN -->
<div class="main">
  <!-- Summary -->
  <div class="section">
    <div class="section-header">
      종합 스케줄
      <span class="section-badge">전체 현황</span>
    </div>
    <div class="table-scroll">
      <table id="summaryTable"></table>
    </div>
  </div>

  <!-- Members -->
  <div class="section">
    <div class="section-header">
      멤버별 스케줄
      <span class="section-badge">O = 가능 · X = 불가 · 클릭하여 입력</span>
    </div>
    <div id="membersContainer"></div>
  </div>
</div>

<!-- NAME EDIT MODAL -->
<div class="modal-overlay" id="modalOverlay" onclick="handleOverlayClick(event)">
  <div class="modal" id="modalBox">
    <div class="modal-title">멤버 이름 편집</div>
    <div id="modalRows"></div>
    <div class="modal-actions">
      <button class="modal-btn-cancel" onclick="closeModal()">취소</button>
      <button class="modal-btn-ok" onclick="applyNames()">확인</button>
    </div>
  </div>
</div>

<!-- TOAST -->
<div class="toast" id="toast">✓ 저장되었습니다</div>

<script>
const STORAGE_KEY = 'team_sched_v2';
const DAYS_KO = ['수','목','금','토','일','월','화'];
const PERIODS = ['오전','오후'];
const AV_COLORS = ['av0','av1','av2','av3','av4','av5','av6','av7'];
const DEFAULT_NAMES = ['멤버 1','멤버 2','멤버 3','멤버 4','멤버 5','멤버 6','멤버 7','멤버 8'];

let weekOffset = 0;
let schedData = {};      // key -> 'O'|'X'|''
let noteData  = {};      // noteKey -> string
let colCollapse = {};    // `${dayIdx}_${period}` -> bool
let memberCollapse = {}; // idx -> bool
let memberNames = [...DEFAULT_NAMES];

/* ─── Week helpers ─── */
function getWeekStart(offset) {
  const now = new Date();
  const dow = now.getDay(); // 0=sun
  const diffToWed = (dow >= 3) ? dow - 3 : dow + 4;
  const d = new Date(now);
  d.setDate(now.getDate() - diffToWed + offset * 7);
  d.setHours(0,0,0,0);
  return d;
}
function getWeekDates(offset) {
  const s = getWeekStart(offset);
  return Array.from({length:7}, (_,i) => { const d=new Date(s); d.setDate(s.getDate()+i); return d; });
}
function fmtDate(d) { return `${d.getMonth()+1}/${d.getDate()}`; }
function weekKey(offset) {
  const d = getWeekStart(offset);
  return `${d.getFullYear()}-${d.getMonth()}-${d.getDate()}`;
}
function cellKey(mi, di, p)  { return `${weekKey(weekOffset)}__m${mi}__d${di}__${p}`; }
function nKey(di, p)          { return `${weekKey(weekOffset)}__note__d${di}__${p}`; }

/* ─── Collapse helpers ─── */
function isCollapsed(di, p)    { return !!colCollapse[`${di}_${p}`]; }
function isDayCollapsed(di)    { return isCollapsed(di,'오전') && isCollapsed(di,'오후'); }
function togglePeriod(di, p)   { colCollapse[`${di}_${p}`] = !isCollapsed(di,p); renderAll(); }
function toggleDay(di) {
  const allC = isDayCollapsed(di);
  colCollapse[`${di}_오전`] = !allC;
  colCollapse[`${di}_오후`] = !allC;
  renderAll();
}
function toggleMember(idx) { memberCollapse[idx] = !memberCollapse[idx]; renderAll(); }

/* ─── OX cycle ─── */
function cycleOX(mi, di, p) {
  const k = cellKey(mi,di,p);
  const cur = schedData[k]||'';
  schedData[k] = cur==='' ? 'O' : cur==='O' ? 'X' : '';
  renderAll();
}
function setNote(di, p, val) { noteData[nKey(di,p)] = val; }

/* ─── Build column headers HTML ─── */
function buildColHeaders(dates, firstColLabel) {
  let r1 = `<tr><th rowspan="2" class="td-name" style="font-size:11px;color:var(--text2);">${firstColLabel}</th>`;
  DAYS_KO.forEach((d,di) => {
    if (isDayCollapsed(di)) {
      r1 += `<th class="th-day td-collapsed" title="펼치기" onclick="toggleDay(${di})">…</th>`;
    } else {
      const span = (isCollapsed(di,'오전')?0:1)+(isCollapsed(di,'오후')?0:1);
      r1 += `<th class="th-day" colspan="${span}" onclick="toggleDay(${di})">${d} <small style="font-weight:400;color:var(--text3)">${fmtDate(dates[di])}</small> <span style="font-size:9px;color:var(--text3)">▼</span></th>`;
    }
  });
  r1 += '</tr>';

  let r2 = '<tr>';
  DAYS_KO.forEach((_,di) => {
    if (!isDayCollapsed(di)) {
      PERIODS.forEach(p => {
        if (!isCollapsed(di,p)) {
          r2 += `<th class="th-period" onclick="togglePeriod(${di},'${p}')" title="숨기기">${p} <span style="font-size:9px">▼</span></th>`;
        }
      });
    }
  });
  r2 += '</tr>';
  return r1+r2;
}

/* ─── Render summary table ─── */
function renderSummary(dates) {
  const el = document.getElementById('summaryTable');
  let html = '<thead>'+buildColHeaders(dates,'구분')+'</thead><tbody>';

  // Note row
  html += '<tr><td class="td-name td-name-sm">📝 메모</td>';
  DAYS_KO.forEach((_,di) => {
    if (isDayCollapsed(di)) {
      html += `<td class="td-collapsed" onclick="toggleDay(${di})">…</td>`;
    } else {
      PERIODS.forEach(p => {
        if (!isCollapsed(di,p)) {
          const v = (noteData[nKey(di,p)]||'').replace(/"/g,'&quot;').replace(/</g,'&lt;');
          html += `<td><input class="note-input" value="${v}" placeholder="메모..." oninput="setNote(${di},'${p}',this.value)"/></td>`;
        }
      });
    }
  });
  html += '</tr>';

  // Member rows
  memberNames.forEach((name,mi) => {
    html += `<tr><td class="td-name td-name-sm"><span class="member-avatar ${AV_COLORS[mi]}" style="width:18px;height:18px;font-size:9px;display:inline-flex;align-items:center;justify-content:center;border-radius:50%;margin-right:4px;">${initials(name)}</span>${name}</td>`;
    DAYS_KO.forEach((_,di) => {
      if (isDayCollapsed(di)) {
        html += `<td class="td-collapsed" onclick="toggleDay(${di})">…</td>`;
      } else {
        PERIODS.forEach(p => {
          if (!isCollapsed(di,p)) {
            const v = schedData[cellKey(mi,di,p)]||'';
            if (v==='O') html += '<td class="v-o">O</td>';
            else if (v==='X') html += '<td class="v-x">X</td>';
            else html += '<td class="v-empty">–</td>';
          }
        });
      }
    });
    html += '</tr>';
  });

  // Count row
  html += '<tr><td class="td-name td-name-sm" style="font-weight:600;color:var(--text);">✅ O 합계</td>';
  DAYS_KO.forEach((_,di) => {
    if (isDayCollapsed(di)) {
      html += `<td class="td-collapsed" onclick="toggleDay(${di})">…</td>`;
    } else {
      PERIODS.forEach(p => {
        if (!isCollapsed(di,p)) {
          let cnt = 0;
          memberNames.forEach((_,mi) => { if ((schedData[cellKey(mi,di,p)]||'')==='O') cnt++; });
          const cls = cnt===memberNames.length ? 'cnt-full' : cnt>0 ? 'cnt-partial' : 'cnt-none';
          html += `<td class="${cls}">${cnt} / ${memberNames.length}</td>`;
        }
      });
    }
  });
  html += '</tr></tbody>';
  el.innerHTML = html;
}

/* ─── Render member blocks ─── */
function renderMembers(dates) {
  const container = document.getElementById('membersContainer');
  let html = '';
  memberNames.forEach((name,mi) => {
    const collapsed = !!memberCollapse[mi];
    html += `<div class="member-block">
      <div class="member-block-header" onclick="toggleMember(${mi})">
        <div class="member-block-name">
          <div class="member-avatar ${AV_COLORS[mi]}">${initials(name)}</div>
          ${name}
        </div>
        <span class="member-block-toggle">${collapsed?'펼치기 ▼':'접기 ▲'}</span>
      </div>`;
    if (!collapsed) {
      html += `<div class="table-scroll" style="border-radius:0;border:none;border-top:0.5px solid var(--border);">
        <table class="member-table" style="min-width:560px;">
          <thead>${buildColHeaders(dates,'구분')}</thead>
          <tbody><tr><td class="td-name">${name}</td>`;
      DAYS_KO.forEach((_,di) => {
        if (isDayCollapsed(di)) {
          html += `<td class="td-collapsed" onclick="toggleDay(${di})">…</td>`;
        } else {
          PERIODS.forEach(p => {
            if (!isCollapsed(di,p)) {
              const v = schedData[cellKey(mi,di,p)]||'';
              const cls = v==='O'?'is-o':v==='X'?'is-x':'';
              html += `<td><button class="ox-btn ${cls}" onclick="cycleOX(${mi},${di},'${p}')">${v||'–'}</button></td>`;
            }
          });
        }
      });
      html += '</tr></tbody></table></div>';
    }
    html += '</div>';
  });
  container.innerHTML = html;
}

function initials(name) {
  const t = name.trim();
  if (!t) return '?';
  if (/[가-힣]/.test(t)) return t.slice(-1);
  return t.slice(0,2).toUpperCase();
}

/* ─── Week label ─── */
function updateWeekLabel(dates) {
  document.getElementById('weekLabel').textContent =
    `${fmtDate(dates[0])} (수) – ${fmtDate(dates[6])} (화)`;
}

function renderAll() {
  const dates = getWeekDates(weekOffset);
  updateWeekLabel(dates);
  renderSummary(dates);
  renderMembers(dates);
}

function changeWeek(dir) { weekOffset += dir; renderAll(); }

/* ─── Save / Load ─── */
function saveData() {
  const payload = { schedData, noteData, colCollapse, memberCollapse, memberNames, weekOffset };
  localStorage.setItem(STORAGE_KEY, JSON.stringify(payload));
  const btn = document.getElementById('saveBtn');
  btn.textContent = '✓ 저장됨';
  btn.classList.add('saved');
  const t = document.getElementById('toast');
  t.classList.add('show');
  setTimeout(() => {
    btn.textContent = '💾 저장';
    btn.classList.remove('saved');
    t.classList.remove('show');
  }, 2200);
}

function loadData() {
  try {
    const raw = localStorage.getItem(STORAGE_KEY);
    if (!raw) return;
    const p = JSON.parse(raw);
    schedData     = p.schedData     || {};
    noteData      = p.noteData      || {};
    colCollapse   = p.colCollapse   || {};
    memberCollapse= p.memberCollapse|| {};
    memberNames   = p.memberNames   || [...DEFAULT_NAMES];
    weekOffset    = p.weekOffset    || 0;
  } catch(e) {}
}

/* ─── Name edit modal ─── */
function openModal() {
  let html = '';
  memberNames.forEach((name,i) => {
    html += `<div class="modal-row">
      <div class="modal-avatar ${AV_COLORS[i]}">${initials(name)}</div>
      <input class="modal-input" id="mname_${i}" value="${name.replace(/"/g,'&quot;')}" placeholder="이름 입력" maxlength="12"/>
    </div>`;
  });
  document.getElementById('modalRows').innerHTML = html;
  document.getElementById('modalOverlay').classList.add('open');
}
function closeModal() {
  document.getElementById('modalOverlay').classList.remove('open');
}
function handleOverlayClick(e) {
  if (e.target === document.getElementById('modalOverlay')) closeModal();
}
function applyNames() {
  memberNames = memberNames.map((_,i) => {
    const v = (document.getElementById(`mname_${i}`)?.value||'').trim();
    return v || DEFAULT_NAMES[i];
  });
  closeModal();
  renderAll();
}

/* ─── Boot ─── */
loadData();
renderAll();
</script>
</body>
</html>
